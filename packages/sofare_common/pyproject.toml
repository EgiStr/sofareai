[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sofare_common"
version = "0.1.0"
description = "Shared components for SOFARE-AI"
authors = [{name = "EgiStr", email = "your.email@example.com"}]
requires-python = ">=3.10"
dependencies = [
    "torch",
    "pandas",
    "numpy",
    "scikit-learn",
    "ta",
    "transformers",
    "scipy",
    "sqlalchemy>=2.0.0",
    "asyncpg",
    "psycopg2-binary",
    "pydantic"
]

[project.optional-dependencies]
dev = ["pytest", "black", "ruff"]
